name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # GitHub requires this to opt into the Node 24 runtime for JavaScript actions.
  # Without it, actions fall back to Node 20 which may emit deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t test

  e2e-api:
    name: API E2E (${{ matrix.os }})
    needs: [test]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx e2e cli-e2e
      - run: pnpm nx e2e dashboard-api-e2e
  e2e-ui:
    name: UI E2E (Playwright)
    needs: [test]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Initialize OCR directory
        run: |
          mkdir -p .ocr/skills .ocr/sessions .ocr/data
          git config user.email "ci@ocr.dev"
          git config user.name "OCR CI"
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm nx e2e dashboard-ui-e2e
