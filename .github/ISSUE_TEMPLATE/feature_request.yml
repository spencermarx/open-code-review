name: Feature Request
description: Suggest a new feature or improvement for Open Code Review
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the feature you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What workflow is missing, slow, or awkward? What are you trying to accomplish?
      placeholder: "When I review a large changeset, I find it difficult to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work? Include examples, commands, or mock output if helpful.
    validations:
      required: true

  - type: checkboxes
    id: packages
    attributes:
      label: Packages Affected
      description: Which parts of OCR would this change touch?
      options:
        - label: "**agents** (skills, commands, reviewer personas)"
        - label: "**cli** (setup, progress tracking, config)"
        - label: "**dashboard** (web UI for review sessions)"
        - label: "Not sure / other"

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches or workarounds?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references that help explain the request.
    validations:
      required: false
