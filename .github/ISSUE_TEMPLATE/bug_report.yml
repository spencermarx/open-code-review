name: Bug Report
description: Report a bug or unexpected behavior in Open Code Review
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen instead?
      placeholder: |
        **What happened:**
        ...

        **What I expected:**
        ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `ocr init`
        2. Stage changes with `git add .`
        3. Run `/ocr:review`
        4. ...
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: AI Environment
      description: Which AI coding environment are you using?
      options:
        - Claude Code
        - Cursor
        - Windsurf
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: ocr-version
    attributes:
      label: OCR Version
      description: "Run `npx @open-code-review/cli --version` or check your plugin version."
      placeholder: "1.8.4"
    validations:
      required: true

  - type: dropdown
    id: review-phase
    attributes:
      label: Review Phase (if applicable)
      description: Which phase of the review workflow was affected?
      options:
        - Not applicable
        - Init / Setup
        - Review (individual reviewers)
        - Synthesis (cross-reviewer debate)
        - Progress / Dashboard
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste any relevant CLI output or error messages. Please redact any sensitive code or API keys.
      render: shell
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS and Node Version
      placeholder: "macOS 15.3, Node 22.0.0"
    validations:
      required: false
